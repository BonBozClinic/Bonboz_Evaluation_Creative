<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bonboz Creative Review</title>
<style>
  :root{--mint:#2E8B7A;--dark:#1f3b35;--bg:#f6f8f7;--card:#fff;--line:#e2e7e5;--text:#1f2a27;--muted:#6b7672;
    --red:#C0392B;--amber:#B8860B;--green:#2E7D32}
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden}
  header{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--card);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:8px;font-weight:bold;color:var(--dark)}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--mint)}
  .nav a{margin-left:5px;font-size:13px;text-decoration:none;color:var(--muted);padding:4px 9px;border-radius:7px}
  .nav a.on{background:var(--bg);color:var(--text);font-weight:bold}
  .btn{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;color:var(--text)}
  .btn:hover{background:var(--bg)} .btn:disabled{opacity:.5;cursor:default} .btn.primary{background:var(--mint);color:#fff;border-color:var(--mint)}
  .spacer{flex:1}
  main{display:grid;grid-template-columns:300px 1fr 322px;gap:12px;padding:12px;height:calc(100vh - 54px)}
  .col{min-width:0;min-height:0;height:100%}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;height:100%;min-height:0;display:flex;flex-direction:column;overflow:hidden}
  .ph{padding:9px 12px;border-bottom:1px solid var(--line);font-weight:bold;display:flex;align-items:center;gap:8px;flex:none}
  .pbody{overflow-y:auto;padding:10px 12px;flex:1 1 auto;min-height:0}
  .center{display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0}
  video{width:100%;max-height:56vh;background:#0d1512;border-radius:10px;display:block}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:var(--muted);gap:10px;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:12px}
  .tl-stages{display:flex;height:19px;font-size:11px;border-radius:5px;overflow:hidden;border:1px solid var(--line)}
  .tl-stages div{display:flex;align-items:center;justify-content:center;color:var(--muted);border-left:1px solid var(--line)}
  .tl-stages div:first-child{border-left:none}
  .tl-wrap{position:relative;height:28px;margin-top:7px;cursor:pointer}
  .tl-bar{position:absolute;left:0;right:0;top:12px;height:6px;background:#e9eeec;border-radius:3px}
  .tl-hook{position:absolute;left:0;top:12px;height:6px;background:rgba(29,158,117,.25);border-radius:3px 0 0 3px}
  .tl-fill{position:absolute;left:0;top:12px;height:6px;background:var(--mint);opacity:.5;border-radius:3px;width:0}
  .tl-head{position:absolute;top:7px;width:2px;height:16px;background:var(--dark);left:0}
  .pin{position:absolute;top:-1px;transform:translateX(-50%);width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;color:#fff;cursor:pointer;border:2px solid #fff}
  .ctrls{display:flex;align-items:center;gap:10px}
  .time{font-variant-numeric:tabular-nums;color:var(--muted)}
  .gh{font-size:11px;font-weight:bold;margin:8px 0 4px;display:flex;align-items:center;gap:6px}
  .note{border:1px solid var(--line);border-radius:8px;padding:7px 8px;margin-bottom:6px;cursor:pointer}
  .note:hover{background:var(--bg)} .note.sel{border-color:var(--mint);background:#f0f7f4}
  .note .top{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
  .note .x{margin-left:auto;border:none;background:none;color:var(--muted);cursor:pointer;font-size:15px}
  .note .b{font-size:12.5px;margin-top:2px;line-height:1.4}
  .sw{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none}
  select,input,textarea{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:6px;width:100%}
  textarea{resize:vertical;min-height:46px}
  .addbox{border-top:1px solid var(--line);padding:9px 12px;flex:none}
  .row{display:flex;gap:7px;margin-bottom:7px;align-items:center}
  .hint{font-size:12px;color:var(--muted)}
  .dim{margin:4px 0;cursor:pointer}
  .dim .bar{display:flex;align-items:center;gap:6px}
  .dim .rsn{font-size:11px;color:var(--muted);margin:2px 0 0 52px;line-height:1.4;display:none}
  .dim.open .rsn{display:block}
  .coll{font-size:11.5px;color:var(--mint);cursor:pointer;margin-top:8px;user-select:none}
  .audit{display:none;font-size:11px;color:var(--muted);margin-top:6px;border-top:1px dashed var(--line);padding-top:6px}
  .audit.open{display:block}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span> Bonboz Creative Review</div>
  <span class="nav"><a class="on" href="/">Review</a><a href="/settings">Settings</a></span>
  <label class="btn">Mở video…<input id="file" type="file" accept="video/*" hidden></label>
  <span id="vname" class="hint">chưa chọn video</span>
  <div class="spacer"></div>
  <span id="status" class="hint"></span>
  <button class="btn primary" id="analyze" disabled>Phân tích bằng AI</button>
  <label class="btn">Nhập<input id="imp" type="file" accept="application/json" hidden></label>
  <button class="btn" id="exp">Xuất</button>
</header>

<main>
  <!-- LEFT: notes -->
  <div class="col">
    <div class="panel">
      <div class="ph"><i></i>Ghi chú <span id="ncount" class="hint" style="font-weight:normal"></span></div>
      <div class="pbody" id="notes"><div class="hint">Chọn video → “Phân tích bằng AI”, hoặc tự thêm note bên dưới.</div></div>
      <div class="addbox">
        <div class="row"><span class="hint" style="white-space:nowrap">Người:</span>
          <select id="author"></select><button class="btn" id="newAuthor">+</button></div>
        <textarea id="ntext" placeholder="Frame này cần sửa gì?"></textarea>
        <div class="row" style="margin:7px 0 0"><span class="hint" id="atTime">tại 0:00</span>
          <span class="spacer"></span><button class="btn primary" id="add">Thêm</button></div>
      </div>
    </div>
  </div>

  <!-- CENTER: video -->
  <div class="col center">
    <div id="empty" class="empty"><div style="font-size:32px">▶</div><div>Bấm <b>Mở video…</b></div></div>
    <video id="v" style="display:none" preload="metadata"></video>
    <div id="tlbox" style="display:none">
      <div class="tl-stages"><div style="width:10%;background:#e1f5ee;color:#0F6E56">0–3s hook</div><div style="width:40%">→50% hold</div><div style="width:35%">→85% retain</div><div style="width:15%">CTA</div></div>
      <div class="tl-wrap" id="tl"><div class="tl-bar"></div><div class="tl-hook" id="hook"></div><div class="tl-fill" id="fill"></div><div class="tl-head" id="head"></div></div>
      <div class="ctrls"><button class="btn" id="play">Phát</button><span class="time" id="time">0:00 / 0:00</span><span class="spacer"></span><button class="btn primary" id="addHere">+ Note tại frame này</button></div>
    </div>
  </div>

  <!-- RIGHT: scorecard -->
  <div class="col">
    <div class="panel">
      <div class="ph">Bảng điểm</div>
      <div class="pbody" id="scard"><div class="hint">Chưa có. Bấm “Phân tích bằng AI”.</div></div>
    </div>
  </div>
</main>

<script>
(function(){
  var v=document.getElementById('v'), tl=document.getElementById('tl'), curFile=null, lastSc=null;
  var state={vname:null,notes:[],dur:0,sel:null,cur:"Bạn",
    authors:[{name:"AI (Claude)",color:"#1D9E75"},{name:"Bạn",color:"#378ADD"},{name:"Tiến",color:"#D85A30"},{name:"C.Mai",color:"#7F77DD"},{name:"A.Thịnh",color:"#BA7517"}]};
  var PAL=["#378ADD","#D85A30","#7F77DD","#BA7517","#D4537E","#639922","#1D9E75","#A32D2D"];
  function key(){return "bcr_"+(state.vname||"none")}
  function save(){if(state.vname)localStorage.setItem(key(),JSON.stringify(state.notes))}
  function load(){try{var s=localStorage.getItem(key());state.notes=s?JSON.parse(s):[]}catch(e){state.notes=[]}}
  function colorOf(n){var a=state.authors.find(function(x){return x.name===n});return a?a.color:"#888"}
  function fmt(t){t=Math.max(0,t||0);var m=Math.floor(t/60),s=Math.floor(t%60);return m+":"+(s<10?"0":"")+s}
  function fillAuthors(){var sel=document.getElementById('author');sel.innerHTML="";state.authors.forEach(function(a){var o=document.createElement('option');o.value=a.name;o.textContent=a.name;sel.appendChild(o)});sel.value=state.cur}
  document.getElementById('author').addEventListener('change',function(){state.cur=this.value});
  document.getElementById('newAuthor').addEventListener('click',function(){var n=prompt("Tên người review:");if(!n)return;if(!state.authors.find(function(x){return x.name===n}))state.authors.push({name:n,color:PAL[state.authors.length%PAL.length]});state.cur=n;fillAuthors();renderNotes()});

  document.getElementById('file').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;
    curFile=f;state.vname=f.name;document.getElementById('vname').textContent=f.name;
    v.src=URL.createObjectURL(f);v.style.display="block";document.getElementById('empty').style.display="none";document.getElementById('tlbox').style.display="block";
    document.getElementById('analyze').disabled=false;load();renderNotes()});
  v.addEventListener('loadedmetadata',function(){state.dur=v.duration||0;document.getElementById('hook').style.width=(state.dur?Math.min(100,3/state.dur*100):10)+"%";renderNotes()});
  v.addEventListener('timeupdate',function(){var p=state.dur?v.currentTime/state.dur*100:0;document.getElementById('fill').style.width=p+"%";document.getElementById('head').style.left=p+"%";document.getElementById('time').textContent=fmt(v.currentTime)+" / "+fmt(state.dur);document.getElementById('atTime').textContent="tại "+fmt(v.currentTime)});
  document.getElementById('play').addEventListener('click',function(){if(v.paused){v.play();this.textContent="Dừng"}else{v.pause();this.textContent="Phát"}});
  tl.addEventListener('click',function(e){if(e.target.classList.contains('pin'))return;var r=tl.getBoundingClientRect();v.currentTime=Math.max(0,Math.min(state.dur,(e.clientX-r.left)/r.width*state.dur))});

  function renderPins(){tl.querySelectorAll('.pin').forEach(function(p){p.remove()});
    state.notes.forEach(function(n,i){var p=document.createElement('div');p.className="pin";p.style.left=(state.dur?n.time/state.dur*100:0)+"%";p.style.background=colorOf(n.author);if(n.unverified)p.style.opacity=".5";p.title=n.author+" · "+fmt(n.time)+" · "+n.text;p.textContent=(n.author[0]||"?").toUpperCase();
      p.addEventListener('click',function(ev){ev.stopPropagation();state.sel=i;v.currentTime=n.time;renderNotes()});tl.appendChild(p)})}
  function noteCard(i){var n=state.notes[i];var d=document.createElement('div');d.className="note"+(state.sel===i?" sel":"");
    d.innerHTML='<div class="top"><span class="sw" style="background:'+colorOf(n.author)+'"></span><span>'+n.author+'</span><span>· '+fmt(n.time)+'</span>'+(n.unverified?'<span title="Chưa chắc — A&B chưa thống nhất">· ⓘ chưa chắc</span>':'')+'<button class="x">×</button></div><div class="b">'+(n.text||"").replace(/</g,"&lt;")+'</div>';
    d.addEventListener('click',function(e){if(e.target.classList.contains('x')){state.notes.splice(i,1);save();renderNotes();return}state.sel=i;v.currentTime=n.time;renderNotes()});return d}
  function renderNotes(){
    renderPins();
    var box=document.getElementById('notes');box.innerHTML="";
    var idx=state.notes.map(function(n,i){return i});
    function grp(title,color,filter){
      var ids=idx.filter(filter);if(!ids.length)return;
      var h=document.createElement('div');h.className="gh";h.style.color=color;h.innerHTML='<span class="sw" style="background:'+color+'"></span>'+title+' ('+ids.length+')';box.appendChild(h);
      ids.sort(function(a,b){return state.notes[a].time-state.notes[b].time}).forEach(function(i){box.appendChild(noteCard(i))});
    }
    var ai=function(i){return state.notes[i].author==="AI (Claude)"};
    grp("Phải sửa","#C0392B",function(i){return ai(i)&&!state.notes[i].unverified&&["CAO","TB"].indexOf(state.notes[i].severity)>=0});
    grp("Nên cải thiện","#B8860B",function(i){return ai(i)&&!state.notes[i].unverified&&state.notes[i].severity==="NHẸ"});
    grp("Chưa chắc — cần xem","#888780",function(i){return ai(i)&&state.notes[i].unverified});
    grp("Người thêm","#378ADD",function(i){return !ai(i)});
    if(!state.notes.length)box.innerHTML='<div class="hint">Chưa có note.</div>';
    document.getElementById('ncount').textContent=state.notes.length?("· "+state.notes.length):"";
  }

  document.getElementById('add').addEventListener('click',function(){var t=document.getElementById('ntext').value.trim();if(!t){alert("Nhập nội dung");return}if(!state.vname){alert("Chọn video");return}state.notes.push({time:+(v.currentTime||0).toFixed(2),author:state.cur,text:t});document.getElementById('ntext').value="";save();renderNotes()});
  document.getElementById('addHere').addEventListener('click',function(){v.pause();document.getElementById('play').textContent="Phát";document.getElementById('ntext').focus()});

  document.getElementById('analyze').addEventListener('click',function(){
    if(!curFile){alert("Chọn video");return}var btn=this,st=document.getElementById('status');btn.disabled=true;st.textContent="Gemini + Claude A/B/C đang chấm… (2-5 phút)";
    var fd=new FormData();fd.append("file",curFile);
    fetch("/api/analyze",{method:"POST",body:fd}).then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j}})})
      .then(function(res){btn.disabled=false;if(!res.ok){st.textContent="Lỗi: "+(res.j.detail||"");return}
        state.notes=state.notes.filter(function(n){return n.author!=="AI (Claude)"});(res.j.notes||[]).forEach(function(n){state.notes.push(n)});save();renderNotes();
        if(res.j.scorecard)renderScorecard(res.j.scorecard);st.textContent=res.j.mode||"";})
      .catch(function(){btn.disabled=false;st.textContent="Lỗi kết nối backend"});
  });
  document.getElementById('exp').addEventListener('click',function(){var b=new Blob([JSON.stringify(state.notes,null,2)],{type:"application/json"});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=(state.vname||"notes")+".json";a.click()});
  document.getElementById('imp').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{JSON.parse(r.result).forEach(function(n){if(typeof n.time==="number"&&n.text)state.notes.push(n)});save();renderNotes()}catch(err){alert("JSON lỗi")}};r.readAsText(f)});

  function renderScorecard(sc){
    lastSc=sc;var box=document.getElementById('scard');
    var DIM=[["vd_hook","Hook"],["vd_hold","Hold"],["vd_message","Msg"],["vd_cta","CTA"],["vd_audience","Aud"],["vd_visual","Visual"],["vd_pacing","Pacing"],["vd_emotion","Emot"],["vd_trust","Trust"]];
    var fcol={"SẴN SÀNG CHẠY":"#2E7D32","SỬA POLICY TRƯỚC":"#B8860B","TỐI ƯU CHẤT LƯỢNG TRƯỚC":"#B8860B","KHÔNG CHẠY":"#C0392B"}[sc.final]||"#B8860B";
    var qcol={"ĐẠT":"#2E7D32","CẦN TỐI ƯU":"#B8860B","YẾU":"#C0392B"}[sc.quality]||"#666";
    var rs=sc.dim_reasons||{},au=sc.dim_audit||{};
    var html='<div class="hint">Quyết định cuối</div><div style="font-size:17px;font-weight:bold;color:'+fcol+'">'+sc.final+'</div>'+
      '<div style="margin:6px 0;font-size:12px">Điểm <b>'+sc.total+'</b> · Chất lượng <b style="color:'+qcol+'">'+sc.quality+'</b> · Policy <b>'+sc.policy+'</b></div>'+
      (sc.escalate?'<div style="font-size:11.5px;color:#C0392B">⚠ Có chỗ A&B chưa thống nhất → xem nhóm “Chưa chắc” bên trái</div>':'')+
      '<div style="border-top:1px solid #e2e7e5;margin-top:8px;padding-top:6px">';
    DIM.forEach(function(d){if(sc.scores[d[0]]===undefined)return;var val=Math.round((sc.scores[d[0]]||0)*10)/10;var bc=val<5?"#C0392B":(val>=7?"#2E7D32":"#2E8B7A");
      html+='<div class="dim" data-d="'+d[0]+'"><div class="bar"><span style="width:46px;font-size:11px;color:#6b7672">'+d[1]+'</span>'+
        '<div style="flex:1;height:7px;background:#eef2f0;border-radius:4px;overflow:hidden"><div style="width:'+(val*10)+'%;height:100%;background:'+bc+'"></div></div>'+
        '<span style="width:24px;text-align:right;font-size:11px;font-weight:bold;color:'+bc+'">'+val+'</span></div>'+
        (rs[d[0]]?'<div class="rsn">'+String(rs[d[0]]).replace(/</g,"&lt;")+'</div>':'')+'</div>';});
    html+='</div><div class="coll" id="auditToggle">▾ Chi tiết AI (audit)</div><div class="audit" id="auditBox"></div>';
    box.innerHTML=html;
    box.querySelectorAll('.dim').forEach(function(el){el.addEventListener('click',function(){this.classList.toggle('open')})});
    var ab='';DIM.forEach(function(d){if(au[d[0]])ab+='<div style="margin:2px 0"><b>'+d[1]+':</b> '+String(au[d[0]]).replace(/</g,"&lt;")+'</div>'});
    if(sc.gemini_trust!=null)ab='<div style="margin-bottom:4px">Gemini trust: <b>'+sc.gemini_trust+'</b></div>'+ab;
    document.getElementById('auditBox').innerHTML=ab||'(không có)';
    document.getElementById('auditToggle').addEventListener('click',function(){document.getElementById('auditBox').classList.toggle('open')});
  }
  fillAuthors();
})();
</script>
</body>
</html>
